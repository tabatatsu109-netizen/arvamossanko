<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ARVAMOS FC お問い合わせページ。ご質問・スポンサーシップ等のお問い合わせはこちらから。">
  <title>CONTACT | ARVAMOS FC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="contact">

  <div id="site-header"></div>

  <div class="page-hero" style="background-image:url('https://images.unsplash.com/photo-1484482340112-e1e2682b4856?w=1920&q=70')">
    <div class="page-hero__overlay"></div>
    <div class="page-hero__content">
      <div class="container">
        <h1 class="page-hero__title">CONTACT</h1>
        <p class="page-hero__breadcrumb"><a href="index.html">HOME</a> / CONTACT</p>
      </div>
    </div>
  </div>

  <main>
    <section class="sec contact-sec" id="contact-sec">
      <div class="container">
        <div class="contact-wrap">

          <!-- Form -->
          <div class="contact-form-col" data-animate>
            <span class="sec-label">SEND MESSAGE</span>
            <h2 class="sec-title sec-title--left">お問い合わせ</h2>
            <div class="sec-rule"></div>
            <p class="contact-intro">ご質問・スポンサーシップ・取材等のお問い合わせはフォームよりお送りください。通常2〜3営業日以内にご返信いたします。</p>

            <form class="c-form" id="contact-form" novalidate>
              <div class="form-row form-row--2">
                <div class="form-group">
                  <label for="f-name">お名前 <span class="req">*</span></label>
                  <input type="text" id="f-name" name="name" required placeholder="山田 太郎" autocomplete="name">
                </div>
                <div class="form-group">
                  <label for="f-email">メールアドレス <span class="req">*</span></label>
                  <input type="email" id="f-email" name="email" required placeholder="example@email.com" autocomplete="email">
                </div>
              </div>
              <div class="form-group">
                <label for="f-cat">お問い合わせ種別</label>
                <select id="f-cat" name="category">
                  <option value="">選択してください</option>
                  <option value="general">一般お問い合わせ</option>
                  <option value="sponsor" id="opt-sponsor">スポンサーシップ</option>
                  <option value="ticket">チケット・観戦</option>
                  <option value="academy">アカデミー</option>
                  <option value="media">メディア・取材</option>
                  <option value="other">その他</option>
                </select>
              </div>
              <div class="form-group">
                <label for="f-subject">件名 <span class="req">*</span></label>
                <input type="text" id="f-subject" name="subject" required placeholder="件名を入力してください">
              </div>
              <div class="form-group">
                <label for="f-message">お問い合わせ内容 <span class="req">*</span></label>
                <textarea id="f-message" name="message" rows="7" required placeholder="お問い合わせ内容を入力してください"></textarea>
              </div>
              <div class="form-group form-group--check">
                <input type="checkbox" id="f-privacy" name="privacy" required>
                <label for="f-privacy"><a href="#" target="_blank">プライバシーポリシー</a>に同意する <span class="req">*</span></label>
              </div>
              <button type="submit" class="btn btn--red btn--full">送信する</button>
              <div class="form-msg" id="form-msg" hidden></div>
            </form>
          </div>

          <!-- Info -->
          <div class="contact-info-col" data-animate>
            <span class="sec-label">INFORMATION</span>
            <h2 class="sec-title sec-title--left">クラブ情報</h2>
            <div class="sec-rule"></div>
            <div class="ci-list" id="ci-list"></div>

            <!-- SNS -->
            <div class="ci-sns-wrap">
              <p class="ci-sns-title">FOLLOW US</p>
              <div class="ci-sns" id="ci-sns"></div>
            </div>

            <!-- Map placeholder -->
            <div class="ci-map">
              <div class="ci-map__inner">
                <svg viewBox="0 0 64 64" width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M32 6C22 6 14 14 14 24c0 14 18 34 18 34s18-20 18-34C50 14 42 6 32 6z"/>
                  <circle cx="32" cy="24" r="6"/>
                </svg>
                <p>スタジアムMAP</p>
                <span>Google Mapsのリンクをここに配置</span>
              </div>
            </div>
          </div>

        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>
  <button class="totop" id="totop" aria-label="トップへ戻る">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18"><polyline points="18 15 12 9 6 15"></polyline></svg>
  </button>
  <nav class="mob-nav" id="mob-nav" aria-label="モバイルナビ"></nav>

  <script src="config.js"></script>
  <script src="main.js"></script>
</body>
</html>
